version: "3.8"

services:
  backend:
    image: ghcr.io/rafaeljuniorvip/mysuno-backend:latest
    environment:
      - NODE_ENV=production
      - PORT=3870
      - DATABASE_URL=postgresql://mysuno:${DB_PASSWORD}@mysuno_db:5432/mysuno
      - SUNO_COOKIE=${SUNO_COOKIE}
      - SUNO_SESSION_ID=${SUNO_SESSION_ID}
      - CLERK_JS_VERSION=${CLERK_JS_VERSION}
    depends_on:
      - db
    networks:
      - minha_rede
      - mysuno_internal
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "2"
          memory: 1G
        reservations:
          cpus: "0.5"
          memory: 256M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.mysuno-api.rule=Host(`api.mysn.vipte.co`)"
        - "traefik.http.routers.mysuno-api.entrypoints=websecure"
        - "traefik.http.routers.mysuno-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.mysuno-api.loadbalancer.server.port=3870"

  frontend:
    image: ghcr.io/rafaeljuniorvip/mysuno-frontend:latest
    networks:
      - minha_rede
      - mysuno_internal
    deploy:
      replicas: 1
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          cpus: "0.25"
          memory: 64M
      labels:
        - "traefik.enable=true"
        - "traefik.http.routers.mysuno-front.rule=Host(`mysn.vipte.co`)"
        - "traefik.http.routers.mysuno-front.entrypoints=websecure"
        - "traefik.http.routers.mysuno-front.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.mysuno-front.loadbalancer.server.port=80"

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_DB=mysuno
      - POSTGRES_USER=mysuno
      - POSTGRES_PASSWORD=${DB_PASSWORD}
    volumes:
      - mysuno_pgdata:/var/lib/postgresql/data
    networks:
      - mysuno_internal
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      resources:
        limits:
          cpus: "2"
          memory: 2G
        reservations:
          cpus: "0.5"
          memory: 512M

volumes:
  mysuno_pgdata:

networks:
  minha_rede:
    external: true
  mysuno_internal:
    driver: overlay
